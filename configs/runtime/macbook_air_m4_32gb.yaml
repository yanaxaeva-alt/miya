name: macbook_air_m4_32gb
description: Development and light runtime profile for MacBook Air M4 32 GB.
default_provider: mlx
default_model_id: qwen3.6-14b-4bit
hardware:
  name: MacBook Air M4 32 GB
  machine_family: macbook_air
  chip: m4
  unified_memory_gb: 32
  runtime_memory_budget_gb: 24
  profile_tier: dev_light
  intended_uses:
    - cli_development
    - config_validation
    - single_worker_runtime
  supports_mlx: true
  max_parallel_models: 1
  notes:
    - Sequential-leaning runtime with explicit fallback for large target models.
    - Multimodal concurrency should stay minimal on this profile.
models:
  - id: qwen3.6-27b-8bit
    provider: mlx
    family: qwen3.6
    variant: 27b
    quantization: 8bit
    roles:
      - reasoning_primary
      - target
    min_memory_gb: 36
    recommended_memory_gb: 48
    context_window: 32768
    fallback_ids:
      - qwen3.6-14b-4bit
    launch:
      model_ref: mlx-community/Qwen3.6-27B-Instruct-8bit
      command:
        - mlx_lm.server
        - --model
        - mlx-community/Qwen3.6-27B-Instruct-8bit
        - --host
        - 127.0.0.1
        - --port
        - "8081"
      host: 127.0.0.1
      port: 8081
  - id: qwen3.6-14b-4bit
    provider: mlx
    family: qwen3.6
    variant: 14b
    quantization: 4bit
    roles:
      - reasoning_primary
      - worker
    min_memory_gb: 16
    recommended_memory_gb: 24
    context_window: 32768
    fallback_ids:
      - qwen3.6-8b-4bit
    launch:
      model_ref: mlx-community/Qwen3.6-14B-Instruct-4bit
      command:
        - mlx_lm.server
        - --model
        - mlx-community/Qwen3.6-14B-Instruct-4bit
        - --host
        - 127.0.0.1
        - --port
        - "8082"
      host: 127.0.0.1
      port: 8082
  - id: qwen3.6-8b-4bit
    provider: mlx
    family: qwen3.6
    variant: 8b
    quantization: 4bit
    roles:
      - worker
      - safe_fallback
    min_memory_gb: 10
    recommended_memory_gb: 16
    context_window: 16384
    fallback_ids: []
    launch:
      model_ref: mlx-community/Qwen3.6-8B-Instruct-4bit
      command:
        - mlx_lm.server
        - --model
        - mlx-community/Qwen3.6-8B-Instruct-4bit
        - --host
        - 127.0.0.1
        - --port
        - "8083"
      host: 127.0.0.1
      port: 8083
