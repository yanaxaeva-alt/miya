[build-system]
requires = ["setuptools>=80.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "miaos"
version = "0.1.0"
description = "Hardware-aware runtime profiles and model providers for MiaOS."
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["PyYAML>=6.0.2"]

[project.scripts]
miaos = "miaos.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "C4"]

[tool.mypy]
python_version = "3.11"
mypy_path = "src"
strict = true
packages = ["miaos"]
